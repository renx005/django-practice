<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Material Design UI</title>

<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Materialize CSS -->
<link href="https://cdn.jsdelivr.net/npm/materialize-css@1.0.0/dist/css/materialize.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
}

.card:hover {
    transform: scale(1.03);
    transition: 0.3s;
}
</style>

</head>

<body class="container">

<h3 class="center-align blue-text text-darken-2">Material Design Cards</h3>

<div class="row">

    <!-- Card 1 -->
    <div class="col s12 m6">
        <div class="card">
            <div class="card-content">
                <span class="card-title">
                    <i class="material-icons left">favorite</i>
                    Card One
                </span>
                <p>Simple Material Design card with icon and button.</p>
            </div>
            <div class="card-action">
                <a class="btn waves-effect waves-light blue">
                    Click Me
                </a>
            </div>
        </div>
    </div>

    <!-- Card 2 -->
    <div class="col s12 m6">
        <div class="card">
            <div class="card-content">
                <span class="card-title">
                    <i class="material-icons left">star</i>
                    Card Two
                </span>
                <p>Material buttons and responsive layout using Materialize.</p>
            </div>
            <div class="card-action">
                <a class="btn waves-effect waves-light green">
                    Learn More
                </a>
            </div>
        </div>
    </div>

</div>

<!-- Materialize JS -->
<script src="https://cdn.jsdelivr.net/npm/materialize-css@1.0.0/dist/js/materialize.min.js"></script>

</body>
</html>
