<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Details using JSON</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
}

#output {
    margin-top: 20px;
    font-size: 18px;
    color: #2c3e50;
    background-color: #ecf0f1;
    display: inline-block;
    padding: 20px;
    border-radius: 8px;
}
</style>

<script>
// JSON Object
var student = {
    "name": "Rena Elza Viju",
    "age": 20,
    "grade": "A"
};

function displayStudent() {
    document.getElementById("output").innerHTML =
        "Name: " + student.name + "<br>" +
        "Age: " + student.age + "<br>" +
        "Grade: " + student.grade;
}
</script>
</head>

<body onload="displayStudent()">

<h2>Student Details</h2>

<div id="output"></div>

</body>
</html>
