<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSS Flexbox Layout</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Container using Flexbox */
.container {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 300px;
    background-color: #f2f2f2;
}

/* Flex Items */
.box {
    background-color: #2c3e50;
    color: white;
    padding: 30px;
    width: 120px;
    text-align: center;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2 style="text-align:center; margin-top:20px;">Flexbox Layout Example</h2>

<div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
</div>

</body>
</html>
