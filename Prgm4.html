<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pricing Table</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Pricing Container */
.pricing-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 50px 20px;
}

/* Pricing Card */
.card {
    border: 1px solid #ccc;
    padding: 20px;
    width: 220px;
    border-radius: 10px;
    background-color: #f9f9f9;
}

.card h2 {
    margin-top: 0;
}

.price {
    font-size: 24px;
    color: green;
    margin: 15px 0;
}

button {
    padding: 8px 15px;
    background-color: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: green;
}

/* Responsive */
@media (max-width: 600px) {
    .pricing-container {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<h1>Pricing Plans</h1>

<div class="pricing-container">

    <div class="card">
        <h2>Basic</h2>
        <p class="price">₹499</p>
        <p>5 Projects</p>
        <p>Email Support</p>
        <button>Choose Plan</button>
    </div>

    <div class="card">
        <h2>Standard</h2>
        <p class="price">₹999</p>
        <p>15 Projects</p>
        <p>Priority Support</p>
        <button>Choose Plan</button>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <p class="price">₹1999</p>
        <p>Unlimited Projects</p>
        <p>24/7 Support</p>
        <button>Choose Plan</button>
    </div>

</div>

</body>
</html>
