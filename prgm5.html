<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Landing Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Hero Section */
.hero {
    background-color: #2c3e50;
    color: white;
    padding: 80px 20px;
}

/* About Section */
.about {
    background-color: #f4f4f4;
    padding: 60px 20px;
}

/* Services Section */
.services {
    background-color: #ecf0f1;
    padding: 60px 20px;
}

/* Contact Section */
.contact {
    background-color: #34495e;
    color: white;
    padding: 60px 20px;
}

button {
    padding: 10px 20px;
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: darkgreen;
}
</style>
</head>

<body>

<!-- Hero Section -->
<section class="hero">
    <h1>Welcome to Our Website</h1>
    <p>Your trusted solution for modern web design.</p>
    <button>Get Started</button>
</section>

<!-- About Section -->
<section class="about">
    <h2>About Us</h2>
    <p>We create responsive and user-friendly websites using modern technologies.</p>
</section>

<!-- Services Section -->
<section class="services">
    <h2>Our Services</h2>
    <p>Web Design | Development | SEO Optimization</p>
</section>

<!-- Contact Section -->
<section class="contact">
    <h2>Contact Us</h2>
    <p>Email: info@example.com</p>
</section>

</body>
</html>
