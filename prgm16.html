<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional UI</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Materialize CSS -->
<link href="https://cdn.jsdelivr.net/npm/materialize-css@1.0.0/dist/css/materialize.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #2c3e50, #4ca1af);
}

.card:hover {
    transform: scale(1.02);
    transition: 0.3s;
}
</style>

</head>

<body>

<!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" href="#">My Professional UI</a>
</div>
</nav>

<!-- Bootstrap Container -->
<div class="container mt-5">

<div class="row">

    <!-- Material Card 1 -->
    <div class="col-md-6 mb-4">
        <div class="card p-3 shadow">
            <div class="card-content">
                <span class="card-title">
                    <i class="material-icons left">dashboard</i>
                    Dashboard
                </span>
                <p>This UI combines Bootstrap grid with Material Design components.</p>
            </div>
            <div class="card-action text-center">
                <a class="btn waves-effect waves-light blue">
                    <i class="material-icons left">send</i>
                    Explore
                </a>
            </div>
        </div>
    </div>

    <!-- Material Card 2 -->
    <div class="col-md-6 mb-4">
        <div class="card p-3 shadow">
            <div class="card-content">
                <span class="card-title">
                    <i class="material-icons left">person</i>
                    Profile
                </span>
                <p>Responsive layout powered by Bootstrap 5 grid system.</p>
            </div>
            <div class="card-action text-center">
                <a class="btn waves-effect waves-light green">
                    <i class="material-icons left">edit</i>
                    Update
                </a>
            </div>
        </div>
    </div>

</div>

</div>

<!-- Materialize JS -->
<script src="https://cdn.jsdelivr.net/npm/materialize-css@1.0.0/dist/js/materialize.min.js"></script>

</body>
</html>
